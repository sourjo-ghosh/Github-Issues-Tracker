<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issues-Tracker</title>
    <!-- DaisyUi and TailwindCss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Login page  -->
    <section class="p-10 mx-auto flex flex-col justify-center items-center">

        <div class="flex flex-col justify-center items-center space-y-3">
            <div class="banner-image mx-auto block">
                <img src="assets/github-logo.png" alt="">
            </div>
            <div class="flex flex-col justify-center items-center">
                <!-- Info  -->
                <h2 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
                <p class="font-medium text-[16px] text-[#64748B]">Sign in to manage your issues</p>
            </div>
        </div>
        <div class="space-y-3 mt-3">
            <fieldset class="fieldset">
                <legend class="fieldset-legend font-medium text-[16px] text-[#1F2937]">Username</legend>
                <input id="username-input" type="text" class="input focus:outline-none w-[350px]" placeholder="Enter Username" />
                <p class="text-[14px] text-[#4A00FF]">Default: admin</p>
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend font-medium text-[16px] text-[#1F2937]">Password</legend>
                <input id="userpassword-input" type="text" class="input focus:outline-none w-[350px]" placeholder="Enter Password" />
                <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>
            </fieldset>
            <section id="incorrect-password" class="hidden">
                <div class="mt-5 bg-[#F8FAFC] w-[350px] flex flex-col justify-center items-center p-5 rounded-xl">
                <p class="text-[14px] text-red-500"><span class="font-semibold">Maybe your Username or Password are incorrect!</p>
            </div>
            </section>
            <button id="signup-btn" class="btn btn-primary w-[350px]">
                Sign In
            </button>
            <div class="flex items-center gap-3">
                <div class="flex-1 h-px bg-gray-300"></div>
                <span class="text-gray-500 text-sm">OR</span>
                <div class="flex-1 h-px bg-gray-300"></div>
            </div>
        </div>
        <div class="flex flex-col justify-center items-center mt-3">
            <!-- Demo Credential -->
            <p class="font-medium text-[14px] text-[#64748B]">Demo Credentials:</p>
            <div class="mt-5 bg-[#F8FAFC] w-[350px] flex flex-col justify-center items-center p-5 rounded-xl">
                <p class="text-[14px] text-[#1F2937]"><span class="font-semibold">Username:</span> admin</p>
                <p class="text-[14px] text-[#1F2937]"><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
